---
# =============================================================================
# Coder Stack — Docker Compose
# =============================================================================
# Components:
#   - postgres   : Coder backend database
#   - dind       : Docker-in-Docker daemon (workspace provisioner)
#   - coder      : Coder server (UI, API, workspace orchestration)
#
# Workspaces are provisioned by Coder into the DinD daemon.
# Each workspace container runs its own inner Docker daemon for devcontainer
# support (privileged, nested DinD).
#
# Tailnet exposure:
#   tsdproxy (running on the host) picks up the coder service via Docker labels
#   and registers it as https://coder.tailaa3fee.ts.net in the Tailnet.
#   tsdproxy handles TLS via Tailscale auto-cert — Coder itself runs plain HTTP.
#
# DNS / Tailscale MagicDNS:
#   Docker bridge containers cannot reach the host Tailscale MagicDNS resolver
#   (100.100.100.100). extra_hosts injects a static /etc/hosts entry for the
#   Coder access URL, pointing it at the VPS Tailscale IP (TAILSCALE_IP in .env).
#   This fixes the startup warning and lets workspace agents phone home correctly.
#   Find your Tailscale IP with: tailscale ip -4
#
# DinD connectivity:
#   DinD runs with network_mode: host so workspace containers can reach Tailscale.
#   Coder connects to DinD via TCP on port 12375, resolving "dind-host" to the VPS
#   Tailscale IP (100.x.x.x). The Tailscale interface is not a Docker bridge, so
#   Docker's iptables isolation rules do not block this traffic. Using host-gateway
#   (172.17.0.1 / docker0) was previously attempted but timed out due to Docker's
#   inter-bridge isolation. The Tailscale IP bypasses that entirely.
#
# Requires: .env (see .env.example)
# =============================================================================

name: coder

networks:
  coder:
    name: coder
    driver: bridge

volumes:
  postgres_data:
  coder_data:
  dind_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Coder metadata & state store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - coder
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coder}
      POSTGRES_USER: ${POSTGRES_USER:-coder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coder} -d ${POSTGRES_DB:-coder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Docker-in-Docker — Workspace container runtime
  # ---------------------------------------------------------------------------
  # Coder uses this daemon (via DOCKER_HOST) to provision workspace containers.
  # Each workspace container will itself run a privileged inner Docker daemon
  # to support devcontainers inside the workspace.
  #
  # network_mode: host is required so that workspace containers spawned by this
  # daemon can reach the host Tailscale interface to phone home to Coder.
  #
  # Port 12375 is used to avoid conflicting with the host dockerd on 2375.
  # ---------------------------------------------------------------------------
  dind:
    image: docker:27-dind
    restart: unless-stopped
    privileged: true                   # Required for DinD
    network_mode: host                 # Required: workspace containers must reach Tailscale
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "coder.tailaa3fee.ts.net:${TAILSCALE_IP}"  # Workspace agents need to resolve this
    environment:
      DOCKER_TLS_CERTDIR: ""           # Disable TLS — internal network only
    volumes:
      - dind_data:/var/lib/docker
    command: ["dockerd", "--host=tcp://0.0.0.0:12375", "--host=unix:///var/run/docker.sock", "--tls=false", "--ipv6=false"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Coder — Workspace platform
  # ---------------------------------------------------------------------------
  coder:
    image: ghcr.io/coder/coder:${CODER_VERSION:-latest}
    restart: unless-stopped
    networks:
      - coder
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "coder.tailaa3fee.ts.net:${TAILSCALE_IP}"  # Resolves own access URL at startup
      # dind-host resolves to the VPS Tailscale IP (100.x.x.x). Unlike docker0
      # (172.17.0.1), the Tailscale interface is not a Docker bridge, so Docker's
      # iptables inter-bridge isolation does not block traffic to it.
      - "dind-host:${TAILSCALE_IP}"
    ports:
      - "${CODER_HTTP_PORT:-7080}:7080"
    environment:
      # --- Database ---
      CODER_PG_CONNECTION_URL: "postgresql://${POSTGRES_USER:-coder}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-coder}?sslmode=disable"

      # --- Bind address ---
      # Default is 127.0.0.1:3000 (loopback only). Must be 0.0.0.0 so the
      # Docker bridge network, tsdproxy, and the health check can reach it.
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"

      # --- Access ---
      # tsdproxy exposes Coder at https://coder.tailaa3fee.ts.net
      # TLS is terminated by tsdproxy; Coder receives plain HTTP on :7080.
      CODER_ACCESS_URL: "${CODER_ACCESS_URL:-https://coder.tailaa3fee.ts.net}"
      # CODER_WILDCARD_ACCESS_URL is intentionally unset:
      #   tsdproxy does not support wildcard subdomains. VS Code Web uses
      #   Coder's built-in path-based proxy (subdomain=false in the template).

      # --- Docker provisioner ---
      # Connects to DinD via the Tailscale IP. Port 12375 avoids conflict with
      # the host dockerd on 2375. See networking note at the top of this file.
      DOCKER_HOST: "tcp://dind-host:12375"

      # --- Logging ---
      CODER_LOG_LEVEL: "${CODER_LOG_LEVEL:-info}"

      # --- Telemetry ---
      CODER_TELEMETRY_ENABLE: "${CODER_TELEMETRY_ENABLE:-false}"

      # --- Terraform provisioner variables ---
      # TF_VAR_* variables are picked up automatically by Coder's embedded
      # Terraform provisioner. This passes the Tailscale IP into the workspace
      # template (var.tailscale_ip) so the agent can resolve the access URL.
      TF_VAR_tailscale_ip: "${TAILSCALE_IP}"
    volumes:
      - coder_data:/home/coder/.config
    labels:
      # -------------------------------------------------------------------------
      # tsdproxy — registers this container in the Tailnet as:
      #   https://coder.tailaa3fee.ts.net
      #
      # tsdproxy (running on the host) discovers this container via the host
      # Docker socket. It proxies HTTPS → HTTP :7080 and provisions a Tailscale
      # auto-cert for the machine name "coder".
      # -------------------------------------------------------------------------
      tsdproxy.enable: "true"
      tsdproxy.name: "coder"
      tsdproxy.container_port: "7080"
      tsdproxy.scheme: "http"           # Coder serves plain HTTP; tsdproxy adds TLS
      tsdproxy.tlsvalidate: "false"     # No TLS on the container side
    depends_on:
      postgres:
        condition: service_healthy
      dind:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7080/healthz || wget -q --spider http://localhost:7080/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s    # Coder runs DB migrations on first boot — give it time
